<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../login/login.css">
    <title>Document</title>
</head>

<body>
    <form id="form">
        <h1>Registrate</h1>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">
        </div>
        <div>
            <label for="password">password</label>
            <input type="password" id="password" name="password" autocomplete="off" placeholder="********">
        </div>
        <div>
            <label for="rol">Rol</label>
            <select name="rol" id="rol">
                <option value="">Seleccione un rol</option>
                <option value="client">Cliente</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit">Registrarse</button>
    </form>

    <script type="module" src="./registro.js"></script>
</body>

</html>
